<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnStation - Premium Control Center</title>
    <!-- FontAwesome for Professional UI Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #080c16, #03050a);
            min-height: 100vh;
            color: #f3f4f6;
            padding-bottom: 50px;
        }

        header {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff007f, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        header p {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .container {
            max-width: 1300px;
            margin: 30px auto 0 auto;
            padding: 0 20px;
        }

        /* Top Analytical Row */
        .analytics-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .analytics-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .analytics-row {
                grid-template-columns: 1fr;
            }
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #9ca3af;
            letter-spacing: 1px;
        }

        .stat-info p {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-top: 5px;
        }

        .stat-icon-wrapper {
            width: 45px;
            height: 45px;
            background: rgba(121, 40, 202, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #7928ca;
        }

        .stat-box:nth-child(2) .stat-icon-wrapper {
            background: rgba(0, 242, 254, 0.15);
            color: #00f2fe;
        }
        .stat-box:nth-child(3) .stat-icon-wrapper {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        .stat-box:nth-child(4) .stat-icon-wrapper {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        /* 2 Column Grid Layout */
        .management-grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 30px;
        }

        @media (max-width: 1000px) {
            .management-grid {
                grid-template-columns: 1fr;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 35px 0 rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
        }

        .glass-card h3 {
            font-size: 1.25rem;
            margin-bottom: 25px;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .glass-card h3 i {
            color: #ff007f;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: rgba(255, 0, 127, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.15);
        }

        .form-group textarea {
            resize: none;
            height: 80px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff007f, #7928ca);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(121, 40, 202, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.3);
            transform: translateY(-2px);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(255, 255, 255, 0.01);
            color: #9ca3af;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        td {
            font-size: 0.9rem;
            color: #e5e7eb;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-success:hover {
            background: #10b981;
            color: white;
        }

        .badge-approved {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <h1>EarnStation Enterprise Control</h1>
        <p>Real-time App Offers & Payout Management Center</p>
    </header>

    <div class="container">
        <!-- Live Analytics Stats Block -->
        <div class="analytics-row">
            <div class="stat-box">
                <div class="stat-info">
                    <h4>Live Applications</h4>
                    <p id="statAppCount">0</p>
                </div>
                <div class="stat-icon-wrapper">
                    <i class="fa-solid fa-mobile-screen-button"></i>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-info">
                    <h4>Pending Payouts</h4>
                    <p id="statPendingCount">0</p>
                </div>
                <div class="stat-icon-wrapper">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-info">
                    <h4>Approved Volume</h4>
                    <p id="statApprovedAmount">₹0</p>
                </div>
                <div class="stat-icon-wrapper">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-info">
                    <h4>Server Network</h4>
                    <p style="font-size: 1.1rem; color: #10b981; font-weight:700;"><i class="fa-solid fa-circle"></i> Optimal</p>
                </div>
                <div class="stat-icon-wrapper">
                    <i class="fa-solid fa-server"></i>
                </div>
            </div>
        </div>

        <div class="management-grid">
            <!-- Left Side: Custom Form Card -->
            <div>
                <div class="glass-card">
                    <h3><i class="fa-solid fa-circle-plus" style="color: #00f2fe;"></i> Create New App Offer</h3>
                    <form id="addAppForm">
                        <div class="form-group">
                            <label for="appName">Application Name</label>
                            <input type="text" id="appName" placeholder="e.g., EarnX Pro" required>
                        </div>
                        <div class="form-group">
                            <label for="appDesc">Short Description</label>
                            <textarea id="appDesc" placeholder="Describe the task and verification rules..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="appReward">Payout / Reward (₹)</label>
                            <input type="number" id="appReward" placeholder="e.g., 120" required>
                        </div>
                        <div class="form-group">
                            <label for="appLink">Download Destination Link</label>
                            <input type="url" id="appLink" placeholder="https://..." required>
                        </div>
                        <button type="submit" class="btn-primary">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Publish Offer Live
                        </button>
                    </form>
                </div>

                <div class="glass-card">
                    <h3><i class="fa-solid fa-list-check" style="color: #ff007f;"></i> Manage Live Apps</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>App Name</th>
                                    <th>Reward</th>
                                    <th>Control</th>
                                </tr>
                            </thead>
                            <tbody id="adminAppList">
                                 <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Side: Withdrawals Panel -->
            <div>
                <div class="glass-card">
                    <h3><i class="fa-solid fa-wallet" style="color: #f59e0b;"></i> User Withdrawal Requests</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Gateway</th>
                                    <th>Receiver Details</th>
                                    <th>Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="adminWithdrawalList">
                                 <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dbURL = "https://cinema-flow-a4e7f-default-rtdb.firebaseio.com/apps.json";
        const txURL = "https://cinema-flow-a4e7f-default-rtdb.firebaseio.com/withdrawals.json";

        function loadAdminApps() {
            fetch(dbURL)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('adminAppList');
                tbody.innerHTML = '';
                
                if(!data) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #9ca3af;">No live apps found.</td></tr>';
                    document.getElementById('statAppCount').innerText = "0";
                    return;
                }

                let appCount = 0;
                for(let id in data) {
                    appCount++;
                    const app = data[id];
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${app.name}</strong></td>
                        <td style="color: #00f2fe; font-weight: 700;">₹${app.reward}</td>
                        <td><button class="btn-danger" onclick="deleteApp('${id}', '${app.name}')"><i class="fa-solid fa-trash-can"></i></button></td>
                    `;
                    tbody.appendChild(row);
                }
                document.getElementById('statAppCount').innerText = appCount;
            });
        }

        function loadWithdrawals() {
            fetch(txURL)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('adminWithdrawalList');
                tbody.innerHTML = '';
                
                if(!data) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #9ca3af;">No recent transactions found.</td></tr>';
                    document.getElementById('statPendingCount').innerText = "0";
                    return;
                }

                let pendingCount = 0;
                let approvedSum = 0;

                for(let id in data) {
                    const tx = data[id];
                    if (tx.status === 'Pending') {
                        pendingCount++;
                    } else if (tx.status === 'Approved') {
                        approvedSum += parseFloat(tx.amount);
                    }

                    const row = document.createElement('tr');
                    const isPending = tx.status === 'Pending';
                    row.innerHTML = `
                        <td><strong>${tx.method}</strong></td>
                        <td>
                            <div style="font-size: 0.85rem; color: #cbd5e1;">${tx.address}</div>
                            <div style="font-size: 0.7rem; color: #64748b;">${tx.timestamp}</div>
                        </td>
                        <td style="font-weight:700; color: #10b981;">₹${tx.amount}</td>
                        <td>
                            ${isPending ? `
                                <button class="btn-success" onclick="updatePayoutStatus('${id}', 'Approved')"><i class="fa-solid fa-check"></i> Pay</button>
                                <button class="btn-danger" style="padding: 6px 10px;" onclick="updatePayoutStatus('${id}', 'Declined')"><i class="fa-solid fa-xmark"></i></button>
                            ` : `
                                <span class="badge-approved">${tx.status}</span>
                            `}
                        </td>
                    `;
                    tbody.appendChild(row);
                }
                
                document.getElementById('statPendingCount').innerText = pendingCount;
                document.getElementById('statApprovedAmount').innerText = "₹" + approvedSum;
            });
        }

        function updatePayoutStatus(id, newStatus) {
            if(confirm(`Are you sure you want to set status to "${newStatus}"?`)) {
                const statusURL = `https://cinema-flow-a4e7f-default-rtdb.firebaseio.com/withdrawals/${id}/status.json`;
                
                fetch(statusURL, {
                    method: "PUT",
                    body: JSON.stringify(newStatus),
                    headers: { "Content-Type": "application/json" }
                })
                .then(() => {
                    alert(`Status updated: ${newStatus}`);
                    loadWithdrawals();
                })
                .catch(err => alert("Failed: " + err));
            }
        }

        document.getElementById('addAppForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('appName').value;
            const desc = document.getElementById('appDesc').value;
            const reward = document.getElementById('appReward').value;
            const link = document.getElementById('appLink').value;

            const newApp = { name, desc, reward, link };

            fetch(dbURL, {
                method: "POST",
                body: JSON.stringify(newApp),
                headers: { "Content-Type": "application/json" }
            })
            .then(() => {
                alert(`Offer "${name}" published!`);
                this.reset();
                loadAdminApps();
            })
            .catch(err => alert("Post error: " + err));
        });

        function deleteApp(id, appName) {
            if(confirm(`Do you really want to delete "${appName}"?`)) {
                const deleteURL = `https://cinema-flow-a4e7f-default-rtdb.firebaseio.com/apps/${id}.json`;
                
                fetch(deleteURL, {
                    method: "DELETE"
                })
                .then(() => {
                    alert("App deleted successfully!");
                    loadAdminApps();
                })
                .catch(err => alert("Delete failed: " + err));
            }
        }

        window.onload = () => {
            loadAdminApps();
            loadWithdrawals();
            setInterval(loadWithdrawals, 10000);
        };
    </script>
</body>
</html>
